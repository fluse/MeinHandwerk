server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Ohne no-store hier kann der Browser sw.js per Heuristik-Caching für Stunden/Tage
    # zwischenspeichern und den Update-Check der Service-Worker-Registrierung nie mit dem
    # Netzwerk abgleichen – die App bliebe dann dauerhaft auf dem alten gecachten Stand.
    location = /sw.js {
        add_header Cache-Control "no-store";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-store";
    }
}
