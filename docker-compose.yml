services:
  pocketbase:
    build:
      context: ./backend
    ports:
      - '${POCKETBASE_PORT:-8090}:8090'
    volumes:
      - ./backend/pb_data:/pb/pb_data
      - ./backend/pb_migrations:/pb/pb_migrations
      - ./backend/pb_hooks:/pb/pb_hooks
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-http://localhost:8090}
        VITE_APP_NAME: ${VITE_APP_NAME:-Handwerkerkalender}
        VITE_APP_SHORT_NAME: ${VITE_APP_SHORT_NAME:-Handwerkerkalender}
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - pocketbase
    restart: unless-stopped
